name: orchestrator

on:
  push:
    paths:
      - "apps/orchestrator/**"
      - ".github/workflows/orchestrator.yml"
  pull_request:
    paths:
      - "apps/orchestrator/**"
      - ".github/workflows/orchestrator.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q
